name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: maldar-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Get version tag
        id: version
        run: |
          VERSION_NAME=$(gradle -q printVersionName --no-daemon)
          TAG="v${VERSION_NAME}"
          echo "Resolved version: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Remove any existing release/tag so the APK is always published as a
      # downloadable release (otherwise re-runs silently fail on a duplicate tag).
      - name: Remove existing release/tag if present
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "$TAG" --yes || true
          git push --delete origin "$TAG" || true

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Maldar ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: true
          files: app/build/outputs/apk/debug/app-debug.apk
