name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      # Recreate the STABLE release keystore from a base64 GitHub secret so every
      # build is signed identically (required for in-place updates to install).
      # Generate it once with:
      #   keytool -genkeypair -v -keystore maldar-release.jks -alias maldar \
      #     -keyalg RSA -keysize 2048 -validity 10000 -noprompt \
      #     -dname "CN=Maldar" -storepass maldar123 -keypass maldar123
      #   base64 -i maldar-release.jks | pbcopy   # paste into RELEASE_KEYSTORE_BASE64 secret
      - name: Restore release keystore
        if: ${{ env.RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > app/keystore/maldar-release.jks
          echo "RELEASE_STORE_FILE=$(pwd)/app/keystore/maldar-release.jks" >> "$GITHUB_ENV"
          echo "RELEASE_STORE_PASSWORD=maldar123" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=maldar" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=maldar123" >> "$GITHUB_ENV"

      # Build the release APK with R8 code shrinking + resource shrinking so
      # only the code/resources actually used are packaged (unused parts are
      # stripped). Tests and other unused tasks are skipped for a lean build.
      - name: Build release APK (shrunk)
        run: gradle assembleRelease --no-daemon -x test

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: maldar-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Get version tag
        id: version
        run: |
          VERSION_NAME=$(gradle -q printVersionName --no-daemon)
          TAG="v${VERSION_NAME}"
          echo "Resolved version: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Remove any existing release/tag so the APK is always published as a
      # downloadable release (otherwise re-runs silently fail on a duplicate tag).
      - name: Remove existing release/tag if present
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "$TAG" --yes || true
          git push --delete origin "$TAG" || true

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Maldar ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: true
          files: app/build/outputs/apk/release/app-release.apk
